<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Care.com Widget Host</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #ffffff;
    }

    iframe {
      width: 100%;
      border: none;
      display: block;
      overflow: hidden;
      /* Height is large enough to avoid inner scrolling on desktop + mobile */
      height: 2000px;
    }

    @media (max-width: 600px) {
      iframe {
        /* Extra height for mobile since Care.com stacks content vertically */
        height: 2600px;
      }
    }
  </style>
</head>

<body>
  <iframe 
    src="https://www.care.com/connect/recacademystl/embed?widget_id=1576&locations[]=1127493&redirect_to_cart=true
">
  </iframe>
</body>
</html>
